<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja Pet Shop</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🛒 Loja Pet Shop</h1>

<nav>

<a href="index.html">Início</a>

<a href="loja.html">Loja</a>

</nav>

</header>

<section class="produtos">

<h2>Produtos</h2>

<div class="cards">

<div class="card">

<h3>Ração Premium</h3>

<p>R$ 80</p>

<button onclick="adicionarCarrinho('Ração Premium',80)">Adicionar</button>

</div>

<div class="card">

<h3>Brinquedo para cachorro</h3>

<p>R$ 25</p>

<button onclick="adicionarCarrinho('Brinquedo',25)">Adicionar</button>

</div>

<div class="card">

<h3>Coleira</h3>

<p>R$ 40</p>

<button onclick="adicionarCarrinho('Coleira',40)">Adicionar</button>

</div>

<div class="card">

<h3>Cama para pet</h3>

<p>R$ 120</p>

<button onclick="adicionarCarrinho('Cama Pet',120)">Adicionar</button>

</div>

</div>

</section>

<section class="carrinho">

<h2>🛒 Carrinho</h2>

<ul id="listaCarrinho"></ul>

<p>Total: R$ <span id="total">0</span></p>

<button onclick="finalizarPedido()">Finalizar Pedido</button>

</section>

<script src="carrinho.js"></script>

</body>

</html>
